<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games Zone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <!-- Logo (Left) -->
            <div class="logo">
                <i class="fas fa-gamepad"></i>
                <span id="logo-text">Games Zone</span>
            </div>

            <!-- Right Actions -->
            <div class="header-right">
                <!-- Search Button -->
                <button class="search-toggle-btn" id="search-toggle">
                    <i class="fas fa-search"></i>
                </button>

                <!-- Language Toggle -->
                <button class="lang-toggle" id="lang-btn">
                    <span id="lang-text">EN</span>
                </button>

                <!-- Menu Hamburger -->
                <button class="menu-toggle" id="menu-btn">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>

        <!-- Search Bar (Hidden by default) -->
        <div class="search-bar-container" id="search-bar-container">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="ابحث عن لعبة..." class="search-input">
                <button class="search-btn"><i class="fas fa-search"></i></button>
            </div>
        </div>
    </header>

    <!-- Mobile Menu -->
    <nav class="mobile-menu" id="mobile-menu">
        <div class="menu-items">
            <a href="#home" class="menu-item">
                <i class="fas fa-home"></i>
                <span id="home-link">الرئيسية</span>
            </a>
            <a href="#about" class="menu-item">
                <i class="fas fa-info-circle"></i>
                <span id="about-link">حول</span>
            </a>
        </div>
        <div class="menu-footer">
            <a href="https://www.tiktok.com" target="_blank" class="tiktok-menu">
                <i class="fab fa-tiktok"></i>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <h1 id="main-title">الألعاب المتاحة</h1>
            
            <div class="games-grid" id="games-grid">
                <!-- Games will be inserted here by JavaScript -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p id="footer-text">&copy; 2026 Games Zone. جميع الحقوق محفوظة.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
