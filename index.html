<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games Zone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <i class="fas fa-gamepad"></i>
                <span id="logo-text">Games Zone</span>
            </div>

            <div class="search-bar">
                <input type="text" id="search-input" placeholder="ابحث عن لعبة..." class="search-input">
                <button class="search-btn"><i class="fas fa-search"></i></button>
            </div>

            <div class="header-actions">
                <button class="lang-toggle" id="lang-btn">
                    <span id="lang-text">EN</span>
                </button>
                
                <a href="https://www.tiktok.com" target="_blank" class="tiktok-btn">
                    <i class="fab fa-tiktok"></i>
                </a>

                <button class="menu-toggle" id="menu-btn">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Mobile Menu -->
    <nav class="mobile-menu" id="mobile-menu">
        <ul>
            <li><a href="#home" id="home-link">الرئيسية</a></li>
            <li><a href="#about" id="about-link">حول</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <h1 id="main-title">الألعاب المتاحة</h1>
            
            <div class="games-grid" id="games-grid">
                <!-- Games will be inserted here by JavaScript -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p id="footer-text">&copy; 2026 Games Zone. جميع الحقوق محفوظة.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
